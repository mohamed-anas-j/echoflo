
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoFlo</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Crystal Slate Palette (Neutral & Cool)
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9', // Sky Blue
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              dark: {
                bg: '#09090b',       // Zinc 950
                surface: '#121215',  // Deep Zinc
                border: '#27272a',   // Zinc 800
              }
            },
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              'glow': '0 0 15px rgba(14, 165, 233, 0.5)',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f4f4f5; /* Zinc 100 - clean tech gray */
        color: #18181b; /* Zinc 900 - High contrast */
        min-height: 100vh;
        overflow-x: hidden;
      }

      .dark body {
        background-color: #000000;
        color: #f4f4f5;
      }
      
      /* Premium Glass Aesthetic */
      .glass-panel {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }

      .dark .glass-panel {
        background: rgba(18, 18, 21, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.5);
      }
      
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #a1a1aa; /* Zinc 400 */
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #3f3f46; /* Zinc 700 */
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #71717a;
      }
      
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
    </style>
